<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Unity Packages</title>
	<meta name="description" content="Drop-in tools for the Unity Editor, installable from a Git URL." />

	<!-- Site text lives in config.json. The package list is auto-generated into packages.json. -->

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="styles.css" />
	<script src="app.js" defer></script>
</head>

<body>
	<div class="wrap">

		<header class="mast">
			<div class="brand">
				<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path d="M12 2 21 7v10l-9 5-9-5V7l9-5Z" stroke="var(--accent)" stroke-width="1.4"
						stroke-linejoin="round" />
					<path d="M12 2v10m0 0 9-5m-9 5-9-5" stroke="var(--accent)" stroke-width="1.4"
						stroke-linejoin="round" opacity=".55" />
				</svg>
				<span><b id="brand-name">unitypackages</b></span>
			</div>
			<a class="mast-link" id="profile-link" href="#" target="_blank" rel="noopener">GitHub →</a>
		</header>

		<section class="hero">
			<p class="eyebrow" id="eyebrow">Unity Package Index</p>
			<h1 id="title">Unity Packages</h1>
			<p class="lede" id="lede"></p>

			<div class="howto">
				<h2>Install from a Git URL</h2>
				<ol class="steps">
					<li>In Unity, open <code>Window ▸ Package Manager</code>.</li>
					<li>Click <code>+</code> ▸ <code>Add package from git URL…</code></li>
					<li>Paste a URL below and press <code>Add</code>.</li>
				</ol>
			</div>
		</section>

		<!-- browse by purpose -->
		<nav class="chips" id="chips" aria-label="Filter by category"></nav>

		<!-- search by name -->
		<div class="filter-row">
			<label class="filter">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6" />
					<path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
				</svg>
				<input id="filter" type="text" placeholder="search by name…" autocomplete="off" spellcheck="false"
					aria-label="Search packages by name" />
			</label>
			<span class="count" id="count"></span>
		</div>

		<main class="catalog" id="list"></main>
		<p class="empty hidden" id="empty">Nothing matches that filter.</p>

		<footer>
			<span id="foot-left"></span>
			<a id="foot-link" href="#" target="_blank" rel="noopener">View all repos on GitHub →</a>
		</footer>
	</div>
</body>

</html>
